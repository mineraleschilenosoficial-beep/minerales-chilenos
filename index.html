<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MineralesChilenos.cl - Mapa minero interactivo</title>
  <meta name="description" content="Mapa minero interactivo de Chile con yacimientos y concesiones disponibles. Sitio 100% frontend listo para GitHub Pages.">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="icon" type="image/svg+xml" href="./favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.0/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.0/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="./assets/site.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="logo"><span class="dot"></span>MineralesChilenos.cl</div>
      <button id="btn-mobile-panel" class="mobile-panel-btn" type="button" aria-controls="sidebar" aria-expanded="false">
        Panel
      </button>
      <div class="top-kpis" id="topKpis"></div>
    </header>
    <div id="mobile-filter-bar" aria-live="polite"></div>

    <aside id="sidebar">
      <div class="sheet-grab" aria-hidden="true"></div>
      <section class="panel">
        <h2>Filtros</h2>
        <div class="field">
          <label for="q">Buscar</label>
          <input id="q" type="text" placeholder="Empresa, yacimiento, region">
        </div>
        <div class="field">
          <label for="f-mineral">Mineral</label>
          <select id="f-mineral"></select>
        </div>
        <div class="field">
          <label for="f-region">Region</label>
          <select id="f-region"></select>
        </div>
        <div class="field">
          <label for="f-tipo">Tipo</label>
          <select id="f-tipo"></select>
        </div>
        <div class="row">
          <button id="btn-libres">Solo concesiones disponibles</button>
          <button id="btn-reset">Limpiar</button>
          <button id="btn-fit" class="btn-gold">Ajustar mapa</button>
        </div>
        <div id="status"></div>
      </section>

      <section class="panel">
        <h2>Resultados</h2>
        <div id="list"></div>
      </section>
    </aside>

    <div id="map"></div>
  </div>
  <div id="mobile-backdrop" aria-hidden="true"></div>

  <aside class="legend">
    <h3>Leyenda</h3>
    <div class="legend-row"><span class="sw" style="background:var(--cobre)"></span> Cobre</div>
    <div class="legend-row"><span class="sw" style="background:var(--litio)"></span> Litio</div>
    <div class="legend-row"><span class="sw" style="background:var(--hierro)"></span> Hierro</div>
    <div class="legend-row"><span class="sw" style="background:var(--verde)"></span> Concesion disponible</div>
  </aside>

  <div id="detail-modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title">Detalle</h3>
      <button class="close" id="btn-close-modal" aria-label="Cerrar">x</button>
    </div>
    <div class="modal-body" id="modal-content"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.0/dist/leaflet.markercluster.js"></script>
  <script src="./assets/config.js"></script>
  <script src="./assets/app.js"></script>
</body>
</html>
