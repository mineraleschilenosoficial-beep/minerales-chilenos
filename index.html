<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MineralesChilenos.cl - Mapa interactivo minero</title>
  <meta name="description" content="Mapa interactivo de yacimientos y concesiones mineras en Chile. Sitio 100% frontend listo para GitHub Pages.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.0/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.0/dist/MarkerCluster.Default.css">
  <script src="https://unpkg.com/leaflet.markercluster@1.5.0/dist/leaflet.markercluster.js"></script>
  <style>
    :root {
      --cobre: #B87333;
      --litio: #5B9BD5;
      --oro: #FFB830;
      --verde: #2D7A4F;
      --gris-dark: #141414;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "DM Sans", sans-serif;
      background: #0A0A0A;
      color: #fff;
      height: 100vh;
      overflow: hidden;
    }

    #header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(12px);
      z-index: 2000;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 15px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }

    .logo {
      font-family: "Bebas Neue", sans-serif;
      font-size: 26px;
      letter-spacing: 2px;
    }

    #map {
      position: absolute;
      top: 64px;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1;
    }

    .mmarker {
      width: 42px;
      height: 42px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 4px solid rgba(255, 255, 255, 0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.8);
      transition: all .3s;
      font-family: "JetBrains Mono", monospace;
      font-weight: 700;
      color: #000;
      font-size: 15px;
    }

    .mmarker-inner {
      transform: rotate(45deg);
      display: inline-block;
      line-height: 1;
    }

    .mmarker:hover {
      transform: rotate(-45deg) scale(1.45);
    }

    #detail-modal {
      position: fixed;
      bottom: -100%;
      left: 0;
      right: 0;
      z-index: 3000;
      background: #1C1C1C;
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -15px 50px rgba(0, 0, 0, 0.9);
      transition: bottom .4s ease;
      max-height: 92vh;
      overflow-y: auto;
    }

    #detail-modal.open {
      bottom: 0;
    }

    .modal-header {
      padding: 18px 24px;
      background: #111;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 22px;
      font-family: "Bebas Neue", sans-serif;
      letter-spacing: 1px;
    }

    .close-btn {
      font-size: 32px;
      cursor: pointer;
      line-height: 1;
    }

    .info-box {
      background: #2A2A2A;
      padding: 18px;
      border-radius: 12px;
      margin: 20px 0;
      line-height: 1.6;
    }

    .pill {
      background: #B87333;
      color: #000;
      padding: 4px 14px;
      border-radius: 9999px;
      font-size: 13px;
      font-weight: 700;
    }

    .libre-section {
      background: #2D7A4F;
      color: #fff;
      padding: 20px;
      border-radius: 12px;
      margin: 20px 0;
    }

    .btn-link {
      display: block;
      background: #fff;
      color: #2D7A4F;
      padding: 16px;
      text-align: center;
      border-radius: 9999px;
      font-weight: 700;
      margin: 12px 0;
      text-decoration: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <header id="header">
    <div class="logo">
      <span style="display:inline-block;width:10px;height:10px;background:#FFB830;border-radius:50%;animation:pulse 2s infinite;"></span>
      <em>Minerales</em>Chilenos.cl
    </div>
    <div style="margin-left:auto;color:#FFB830;font-size:14px;">65+ yacimientos - 12 concesiones libres</div>
  </header>

  <div id="map"></div>

  <div id="detail-modal">
    <div class="modal-header">
      <div id="modal-nombre">-</div>
      <div class="close-btn" onclick="cerrarModal()">✕</div>
    </div>
    <div id="modal-content" style="padding:0 24px 30px;"></div>
  </div>

  <script>
    const YACIMIENTOS = [
      {id:1, nombre:"Chuquicamata", mineral:["cobre"], lat:-22.3167, lng:-68.9167, region:"Antofagasta", tipo:"Mina activa", empresa:"CODELCO", sup:"85.000 ha", alt:"2.870 msnm", prod:"330.000 t Cu/año", dotacion:"12.500 trabajadores", sueldos_promedio:"CLP 2.800.000 / mes", ingresos:"USD 8.500 millones", inversiones:"USD 1.800 millones", contrataciones_futuras:"350 en 2026", noticias:"Transición a mina subterránea en marcha.", web:"https://www.codelco.com", libre:false},
      {id:2, nombre:"Escondida", mineral:["cobre"], lat:-24.2833, lng:-69.0667, region:"Antofagasta", tipo:"Mina activa", empresa:"BHP", sup:"140.000 ha", alt:"3.050 msnm", prod:"1.200.000 t Cu/año", dotacion:"19.000 trabajadores", sueldos_promedio:"CLP 3.100.000 / mes", ingresos:"USD 12.000 millones", inversiones:"USD 10.500 millones", contrataciones_futuras:"600 en 2025-2027", noticias:"La mina más grande del mundo.", web:"https://www.escondida.cl", libre:false},
      {id:3, nombre:"El Teniente", mineral:["cobre"], lat:-34.0833, lng:-70.35, region:"O'Higgins", tipo:"Mina activa", empresa:"CODELCO", sup:"35.000 ha", alt:"2.100 msnm", prod:"480.000 t Cu/año", dotacion:"14.000 trabajadores", sueldos_promedio:"CLP 2.650.000 / mes", ingresos:"USD 4.200 millones", inversiones:"USD 3.000 millones", contrataciones_futuras:"420 en 2026", noticias:"Proyecto Nuevo Nivel Mina.", web:"https://www.codelco.com", libre:false},
      {id:4, nombre:"Los Pelambres", mineral:["cobre"], lat:-31.8167, lng:-70.5333, region:"Coquimbo", tipo:"Mina activa", empresa:"Antofagasta Minerals", sup:"70.000 ha", alt:"3.400 msnm", prod:"360.000 t Cu/año", dotacion:"8.500 trabajadores", sueldos_promedio:"CLP 2.900.000 / mes", ingresos:"USD 3.800 millones", inversiones:"USD 1.500 millones", contrataciones_futuras:"300 en 2025", noticias:"Expansión en curso.", web:"https://www.pelambres.cl", libre:false},
      {id:5, nombre:"Collahuasi", mineral:["cobre"], lat:-20.9833, lng:-68.7, region:"Tarapacá", tipo:"Mina activa", empresa:"Glencore / Anglo American", sup:"180.000 ha", alt:"4.400 msnm", prod:"610.000 t Cu/año", dotacion:"10.200 trabajadores", sueldos_promedio:"CLP 3.000.000 / mes", ingresos:"USD 5.200 millones", inversiones:"USD 2.000 millones", contrataciones_futuras:"400 en 2026", noticias:"Expansión en altura.", web:"https://www.collahuasi.cl", libre:false},
      {id:11, nombre:"Salar de Atacama (SQM)", mineral:["litio"], lat:-23.55, lng:-68.25, region:"Antofagasta", tipo:"Mina activa", empresa:"SQM", sup:"182.000 ha", alt:"2.300 msnm", prod:"180.000 t LCE/año", dotacion:"3.200 trabajadores", sueldos_promedio:"CLP 2.900.000 / mes", ingresos:"USD 2.800 millones", inversiones:"USD 1.200 millones", contrataciones_futuras:"280 en 2025", noticias:"Joint venture con CODELCO.", web:"https://www.sqm.com", libre:false},
      {id:12, nombre:"Salar de Atacama (Albemarle)", mineral:["litio"], lat:-23.65, lng:-68.3, region:"Antofagasta", tipo:"Mina activa", empresa:"Albemarle", sup:"60.000 ha", alt:"2.300 msnm", prod:"85.000 t LCE/año", dotacion:"1.800 trabajadores", sueldos_promedio:"CLP 3.100.000 / mes", ingresos:"USD 1.400 millones", inversiones:"USD 800 millones", contrataciones_futuras:"150 en 2026", noticias:"Expansión en curso.", web:"https://www.albemarle.com", libre:false},
      {id:14, nombre:"Salar de Pedernales", mineral:["litio"], lat:-26.3, lng:-69.2, region:"Atacama", tipo:"Concesión disponible", libre:true, sup:"88.000 ha", alt:"3.400 msnm", potencial:"200.000 t LCE estimadas", prof:"Salmuera 0-200 m", estudioFecha:"2022", estudioFuente:"SERNAGEOMIN / CORFO", dotacion:"0 (disponible)", sueldos_promedio:"-", ingresos:"-", inversiones:"-", contrataciones_futuras:"-", noticias:"Estudios técnicos completos disponibles.", docs:[{n:"Estudio Geológico 2022", url:"https://www.sernageomin.cl", tipo:"Técnico"}, {n:"Informe CORFO Litio", url:"https://www.corfo.cl", tipo:"Evaluación"}], web:"#"},
      {id:15, nombre:"Salar de Punta Negra", mineral:["litio"], lat:-24.55, lng:-68.55, region:"Antofagasta", tipo:"Concesión disponible", libre:true, sup:"31.000 ha", alt:"3.600 msnm", potencial:"80.000 t LCE estimadas", prof:"Salmuera 0-150 m", estudioFecha:"2023", estudioFuente:"SERNAGEOMIN", dotacion:"0 (disponible)", sueldos_promedio:"-", ingresos:"-", inversiones:"-", contrataciones_futuras:"-", noticias:"Informe exploratorio reciente.", docs:[{n:"Informe Exploratorio 2023", url:"https://www.sernageomin.cl", tipo:"Técnico"}], web:"#"},
      {id:22, nombre:"Prospecto Cerro Imán", mineral:["hierro"], lat:-29.2, lng:-70.8, region:"Coquimbo", tipo:"Concesión disponible", libre:true, sup:"9.500 ha", alt:"1.800 msnm", potencial:"150 Mt Fe estimado", prof:"Afloramiento + 400 m", estudioFecha:"2022", estudioFuente:"SERNAGEOMIN", dotacion:"0 (disponible)", sueldos_promedio:"-", ingresos:"-", inversiones:"-", contrataciones_futuras:"-", noticias:"Estudio magnético aéreo disponible.", docs:[{n:"Estudio Magnético Aéreo 2022", url:"https://www.sernageomin.cl", tipo:"Técnico"}], web:"#"}
    ];

    const map = L.map("map", { center: [-30.5, -70.2], zoom: 5 });
    L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", { maxZoom: 19 }).addTo(map);

    const clusterGroup = L.markerClusterGroup({ maxClusterRadius: 50 }).addTo(map);

    function crearMarcadores() {
      clusterGroup.clearLayers();
      YACIMIENTOS.forEach((y) => {
        const color = y.libre ? "#2D7A4F" : "#B87333";
        const letra = y.libre ? "🔓" : y.mineral[0][0].toUpperCase();
        const iconHtml = `<div class="mmarker" style="background:${color}"><div class="mmarker-inner">${letra}</div></div>`;
        const icon = L.divIcon({ html: iconHtml, className: "", iconSize: [42, 42], iconAnchor: [21, 42] });
        const marker = L.marker([y.lat, y.lng], { icon });
        marker.on("click", () => abrirDetalle(y));
        clusterGroup.addLayer(marker);
      });
    }

    function abrirDetalle(y) {
      const content = document.getElementById("modal-content");
      let html = `
        <div style="font-size:28px;font-family:'Bebas Neue',sans-serif;margin-bottom:8px;">${y.nombre}</div>
        <div style="color:#FFB830;font-size:14px;margin-bottom:20px;">${y.tipo} • ${y.region}</div>
        <div style="display:flex;gap:8px;margin-bottom:24px;">
          ${(y.mineral || []).map((m) => `<span class="pill">${m.toUpperCase()}</span>`).join("")}
        </div>
        <div class="info-box">
          🏭 Empresa: <strong>${y.empresa || "Disponible para concesión"}</strong><br>
          📏 Superficie: <strong>${y.sup}</strong><br>
          🏔️ Altitud: <strong>${y.alt}</strong><br>
          📈 Producción: <strong>${y.prod || "-"}</strong>
        </div>
        <div class="info-box">
          👷 Dotación actual: <strong>${y.dotacion}</strong><br>
          💰 Sueldos promedio: <strong>${y.sueldos_promedio}</strong><br>
          📊 Ingresos anuales: <strong>${y.ingresos}</strong><br>
          🔨 Nuevas inversiones: <strong>${y.inversiones}</strong><br>
          📅 Contrataciones futuras: <strong>${y.contrataciones_futuras}</strong>
        </div>
      `;

      if (y.libre) {
        html += `
          <div class="libre-section">
            <div style="font-size:18px;font-weight:700;margin-bottom:12px;">✅ CONCESIÓN DISPONIBLE</div>
            <div style="margin-bottom:16px;">
              <strong>Potencial estimado:</strong> ${y.potencial}<br>
              <strong>Profundidad:</strong> ${y.prof}<br>
              <strong>Último estudio:</strong> ${y.estudioFecha} • ${y.estudioFuente}
            </div>
            <div style="font-family:'JetBrains Mono',monospace;font-size:13px;margin-bottom:8px;">📄 ESTUDIOS TÉCNICOS DISPONIBLES</div>
            ${(y.docs || []).map((d) => `
              <a href="${d.url}" target="_blank" style="display:block;background:rgba(255,255,255,0.15);padding:14px;border-radius:10px;margin-bottom:8px;color:#fff;text-decoration:none;">
                📑 ${d.n} <span style="float:right;opacity:0.8;font-size:12px;">${d.tipo}</span>
              </a>
            `).join("")}
            <a href="https://cmn.sernageomin.cl" target="_blank" class="btn-link">🗺️ Ver en Catastro Minero Nacional (CMN)</a>
            <a href="https://www.sernageomin.cl/mineria-concesiones-mineras/" target="_blank" class="btn-link">📋 Solicitar concesión ahora (SERNAGEOMIN)</a>
          </div>
        `;
      }

      html += `
        <div style="margin-top:20px;">
          <div style="font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:1px;color:#FFB830;margin-bottom:8px;">📰 NOTICIAS RELEVANTES</div>
          <div style="background:#2A2A2A;padding:14px;border-radius:12px;">${y.noticias || "Sin novedades por ahora."}</div>
        </div>
        ${y.web && y.web !== "#" ? `<a href="${y.web}" target="_blank" class="btn-link" style="background:#FFB830;color:#000;margin-top:20px;">🌐 Página web corporativa</a>` : ""}
      `;

      content.innerHTML = html;
      document.getElementById("detail-modal").classList.add("open");
    }

    function cerrarModal() {
      document.getElementById("detail-modal").classList.remove("open");
    }

    crearMarcadores();
    console.log("%c✅ Sitio frontend listo para GitHub Pages", "color:#FFB830;font-size:14px");
  </script>
</body>
</html>
