<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MineralesChilenos.cl - Mapa minero interactivo</title>
  <meta name="description" content="Mapa minero interactivo de Chile con yacimientos y concesiones disponibles. Sitio 100% frontend listo para GitHub Pages.">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.0/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.0/dist/MarkerCluster.Default.css">
  <script src="https://unpkg.com/leaflet.markercluster@1.5.0/dist/leaflet.markercluster.js"></script>
  <style>
    :root {
      --bg: #0a0a0a;
      --panel: #131313;
      --panel-2: #1b1b1b;
      --line: rgba(255, 255, 255, 0.12);
      --text: #f7f7f7;
      --muted: #b8b8b8;
      --gold: #ffb830;
      --cobre: #b87333;
      --litio: #5b9bd5;
      --hierro: #858585;
      --verde: #2d7a4f;
      --shadow: 0 14px 34px rgba(0, 0, 0, 0.5);
      --header-h: 66px;
      --sidebar-w: 360px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Inter", system-ui, sans-serif;
      color: var(--text);
      background: var(--bg);
    }

    #app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: var(--sidebar-w) 1fr;
      grid-template-rows: var(--header-h) 1fr;
      grid-template-areas:
        "header header"
        "sidebar map";
    }

    header {
      grid-area: header;
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(10, 10, 10, 0.96);
      backdrop-filter: blur(10px);
      z-index: 1200;
    }

    .logo {
      font-family: "Bebas Neue", sans-serif;
      letter-spacing: 1.7px;
      font-size: 28px;
      display: flex;
      align-items: center;
      gap: 9px;
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 10px var(--gold);
      animation: pulse 2.3s infinite;
    }

    .top-kpis {
      margin-left: auto;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .kpi {
      border: 1px solid var(--line);
      background: #121212;
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      color: var(--muted);
    }

    aside {
      grid-area: sidebar;
      border-right: 1px solid var(--line);
      background: linear-gradient(180deg, #141414, #101010);
      overflow-y: auto;
      padding: 16px;
      display: grid;
      gap: 14px;
      align-content: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 14px;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--gold);
      font-family: "JetBrains Mono", monospace;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }

    .field label {
      font-size: 12px;
      color: var(--muted);
    }

    .field input,
    .field select {
      width: 100%;
      background: var(--panel-2);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px 11px;
      font: inherit;
      font-size: 14px;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      border: 1px solid var(--line);
      background: #1a1a1a;
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 600;
      cursor: pointer;
      transition: .2s ease;
    }

    button:hover {
      border-color: rgba(255, 184, 48, 0.55);
      transform: translateY(-1px);
    }

    .btn-gold {
      background: var(--gold);
      color: #121212;
      border-color: transparent;
    }

    #status {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.45;
      margin-top: 2px;
    }

    #list {
      display: grid;
      gap: 8px;
      max-height: 34vh;
      overflow: auto;
      padding-right: 3px;
    }

    .item {
      border: 1px solid var(--line);
      background: #171717;
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
      display: grid;
      gap: 4px;
      transition: .2s ease;
    }

    .item:hover {
      border-color: rgba(255, 184, 48, 0.45);
      background: #1c1c1c;
    }

    .item-title {
      font-weight: 700;
      font-size: 14px;
    }

    .item-meta {
      color: var(--muted);
      font-size: 12px;
    }

    #map {
      grid-area: map;
      width: 100%;
      height: calc(100vh - var(--header-h));
    }

    .legend {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 1200;
      border: 1px solid var(--line);
      background: rgba(16, 16, 16, 0.92);
      backdrop-filter: blur(8px);
      border-radius: 12px;
      padding: 12px;
      width: min(300px, calc(100vw - 24px));
    }

    .legend h3 {
      margin: 0 0 10px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--gold);
      font-family: "JetBrains Mono", monospace;
    }

    .legend-row {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .sw {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    #detail-modal {
      position: fixed;
      inset: auto 0 -100% 0;
      z-index: 1400;
      background: #1c1c1c;
      border-radius: 18px 18px 0 0;
      box-shadow: 0 -12px 36px rgba(0, 0, 0, 0.65);
      transition: bottom .33s ease;
      max-height: 88vh;
      overflow-y: auto;
      border-top: 1px solid var(--line);
    }

    #detail-modal.open { bottom: 0; }

    .modal-header {
      position: sticky;
      top: 0;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 16px 20px;
      background: #141414;
      border-bottom: 1px solid var(--line);
    }

    .modal-title {
      margin: 0;
      font-family: "Bebas Neue", sans-serif;
      font-size: 31px;
      letter-spacing: 1px;
    }

    .close {
      font-size: 28px;
      line-height: 1;
      cursor: pointer;
      color: #f2f2f2;
      background: transparent;
      border: none;
      padding: 0 4px;
    }

    .modal-body { padding: 18px 20px 24px; }

    .card {
      background: #262626;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 13px 14px;
      margin-bottom: 12px;
      line-height: 1.55;
    }

    .link-btn {
      display: inline-block;
      text-decoration: none;
      border-radius: 999px;
      background: var(--gold);
      color: #141414;
      padding: 10px 14px;
      margin-top: 8px;
      font-weight: 700;
    }

    .marker-pin {
      width: 36px;
      height: 36px;
      border-radius: 50% 50% 50% 0;
      transform: rotate(-45deg);
      border: 3px solid rgba(255, 255, 255, 0.72);
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
    }

    .marker-pin > span {
      transform: rotate(45deg);
      color: #141414;
      font-family: "JetBrains Mono", monospace;
      font-weight: 700;
      font-size: 12px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: .45; }
    }

    @media (max-width: 980px) {
      :root { --sidebar-w: 100%; }
      #app {
        grid-template-columns: 1fr;
        grid-template-rows: var(--header-h) auto 1fr;
        grid-template-areas:
          "header"
          "sidebar"
          "map";
      }
      aside {
        border-right: none;
        border-bottom: 1px solid var(--line);
        max-height: 42vh;
      }
      #map {
        height: 58vh;
      }
      .top-kpis { display: none; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div class="logo"><span class="dot"></span>MineralesChilenos.cl</div>
      <div class="top-kpis" id="topKpis"></div>
    </header>

    <aside>
      <section class="panel">
        <h2>Filtros</h2>
        <div class="field">
          <label for="q">Buscar</label>
          <input id="q" type="text" placeholder="Empresa, yacimiento, región">
        </div>
        <div class="field">
          <label for="f-mineral">Mineral</label>
          <select id="f-mineral"></select>
        </div>
        <div class="field">
          <label for="f-region">Región</label>
          <select id="f-region"></select>
        </div>
        <div class="field">
          <label for="f-tipo">Tipo</label>
          <select id="f-tipo"></select>
        </div>
        <div class="row">
          <button id="btn-libres">Solo concesiones disponibles</button>
          <button id="btn-reset">Limpiar</button>
          <button id="btn-fit" class="btn-gold">Ajustar mapa</button>
        </div>
        <div id="status"></div>
      </section>

      <section class="panel">
        <h2>Resultados</h2>
        <div id="list"></div>
      </section>
    </aside>

    <div id="map"></div>
  </div>

  <aside class="legend">
    <h3>Leyenda</h3>
    <div class="legend-row"><span class="sw" style="background:var(--cobre)"></span> Cobre</div>
    <div class="legend-row"><span class="sw" style="background:var(--litio)"></span> Litio</div>
    <div class="legend-row"><span class="sw" style="background:var(--hierro)"></span> Hierro</div>
    <div class="legend-row"><span class="sw" style="background:var(--verde)"></span> Concesión disponible</div>
  </aside>

  <div id="detail-modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title">Detalle</h3>
      <button class="close" aria-label="Cerrar" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="modal-content"></div>
  </div>

  <script>
    const DATA_URL = "./data/yacimientos.json";
    const CACHE_KEY = "mineraleschilenos:data:v1";
    const CACHE_TTL_MS = 1000 * 60 * 60 * 6;
    const map = L.map("map", { center: [-30.5, -70.2], zoom: 5 });
    const cluster = L.markerClusterGroup({ maxClusterRadius: 48, showCoverageOnHover: false });
    map.addLayer(cluster);
    L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
      maxZoom: 19
    }).addTo(map);

    let allItems = [];
    let filtered = [];
    let onlyLibres = false;
    const markerById = new Map();

    const els = {
      q: document.getElementById("q"),
      mineral: document.getElementById("f-mineral"),
      region: document.getElementById("f-region"),
      tipo: document.getElementById("f-tipo"),
      list: document.getElementById("list"),
      status: document.getElementById("status"),
      topKpis: document.getElementById("topKpis"),
      btnLibres: document.getElementById("btn-libres"),
      btnReset: document.getElementById("btn-reset"),
      btnFit: document.getElementById("btn-fit")
    };

    function colorFor(item) {
      if (item.libre) return "#2D7A4F";
      const m = (item.mineral && item.mineral[0] || "").toLowerCase();
      if (m.includes("litio")) return "#5B9BD5";
      if (m.includes("hierro")) return "#858585";
      return "#B87333";
    }

    function symbolFor(item) {
      if (item.libre) return "L";
      const m = (item.mineral && item.mineral[0] || "").toLowerCase();
      if (m.includes("litio")) return "Li";
      if (m.includes("hierro")) return "Fe";
      return "Cu";
    }

    function formatDate(iso) {
      if (!iso) return "-";
      const dt = new Date(iso);
      if (Number.isNaN(dt.getTime())) return iso;
      return dt.toLocaleString("es-CL", { dateStyle: "medium", timeStyle: "short" });
    }

    function setTopKpis(meta, items) {
      const libres = items.filter((x) => x.libre).length;
      const activos = items.length - libres;
      const html = `
        <div class="kpi">${items.length} puntos</div>
        <div class="kpi">${activos} activos</div>
        <div class="kpi">${libres} disponibles</div>
        <div class="kpi">Actualizado: ${formatDate(meta && meta.updatedAt)}</div>
      `;
      els.topKpis.innerHTML = html;
    }

    function setStatus(origin, totalShown, totalAll, updatedAt) {
      const label = origin === "cache" ? "cache local" : "fuente remota";
      els.status.textContent = `Mostrando ${totalShown} de ${totalAll}. Fuente: ${label}. Ultima actualizacion: ${formatDate(updatedAt)}.`;
    }

    function fillSelect(selectEl, values, placeholder) {
      const options = [`<option value="">${placeholder}</option>`]
        .concat(Array.from(values).sort((a, b) => a.localeCompare(b)).map((v) => `<option value="${v}">${v}</option>`));
      selectEl.innerHTML = options.join("");
    }

    function buildMarker(item) {
      const html = `
        <div class="marker-pin" style="background:${colorFor(item)}">
          <span>${symbolFor(item)}</span>
        </div>
      `;
      const icon = L.divIcon({
        html,
        className: "",
        iconSize: [36, 36],
        iconAnchor: [18, 36]
      });
      const marker = L.marker([item.lat, item.lng], { icon });
      marker.on("click", () => openDetail(item));
      return marker;
    }

    function renderList() {
      if (!filtered.length) {
        els.list.innerHTML = `<div class="item"><div class="item-title">Sin resultados</div><div class="item-meta">Ajusta filtros o limpia busqueda.</div></div>`;
        return;
      }
      els.list.innerHTML = filtered.map((x) => `
        <article class="item" data-id="${x.id}">
          <div class="item-title">${x.nombre}</div>
          <div class="item-meta">${x.tipo} · ${x.region}</div>
          <div class="item-meta">${(x.mineral || []).join(", ").toUpperCase()}</div>
        </article>
      `).join("");
      els.list.querySelectorAll(".item[data-id]").forEach((node) => {
        node.addEventListener("click", () => {
          const id = Number(node.getAttribute("data-id"));
          const item = filtered.find((it) => it.id === id);
          if (!item) return;
          const marker = markerById.get(id);
          if (marker) {
            map.flyTo([item.lat, item.lng], Math.max(7, map.getZoom()), { duration: 0.45 });
            marker.fire("click");
          }
        });
      });
    }

    function applyFilters() {
      const q = els.q.value.trim().toLowerCase();
      const fMineral = els.mineral.value;
      const fRegion = els.region.value;
      const fTipo = els.tipo.value;

      filtered = allItems.filter((x) => {
        if (onlyLibres && !x.libre) return false;
        if (fMineral && !(x.mineral || []).includes(fMineral)) return false;
        if (fRegion && x.region !== fRegion) return false;
        if (fTipo && x.tipo !== fTipo) return false;
        if (q) {
          const haystack = `${x.nombre} ${x.region} ${x.empresa || ""} ${(x.mineral || []).join(" ")}`.toLowerCase();
          if (!haystack.includes(q)) return false;
        }
        return true;
      });

      cluster.clearLayers();
      markerById.clear();
      filtered.forEach((x) => {
        const marker = buildMarker(x);
        markerById.set(x.id, marker);
        cluster.addLayer(marker);
      });
      renderList();
      setStatus(window.__dataOrigin || "remote", filtered.length, allItems.length, window.__dataUpdatedAt || null);
    }

    function fitToFiltered() {
      if (!filtered.length) return;
      const bounds = L.latLngBounds(filtered.map((x) => [x.lat, x.lng]));
      map.fitBounds(bounds.pad(0.25), { animate: true, duration: 0.55 });
    }

    function wireUi() {
      ["input", "change"].forEach((evt) => {
        els.q.addEventListener(evt, applyFilters);
        els.mineral.addEventListener(evt, applyFilters);
        els.region.addEventListener(evt, applyFilters);
        els.tipo.addEventListener(evt, applyFilters);
      });

      els.btnLibres.addEventListener("click", () => {
        onlyLibres = !onlyLibres;
        els.btnLibres.classList.toggle("btn-gold", onlyLibres);
        applyFilters();
      });

      els.btnReset.addEventListener("click", () => {
        onlyLibres = false;
        els.btnLibres.classList.remove("btn-gold");
        els.q.value = "";
        els.mineral.value = "";
        els.region.value = "";
        els.tipo.value = "";
        applyFilters();
      });

      els.btnFit.addEventListener("click", fitToFiltered);
    }

    function saveCache(payload) {
      try {
        localStorage.setItem(CACHE_KEY, JSON.stringify({
          ts: Date.now(),
          payload
        }));
      } catch {}
    }

    function loadCache() {
      try {
        const raw = localStorage.getItem(CACHE_KEY);
        if (!raw) return null;
        const obj = JSON.parse(raw);
        if (!obj || !obj.ts || !obj.payload) return null;
        if ((Date.now() - obj.ts) > CACHE_TTL_MS) return null;
        return obj.payload;
      } catch {
        return null;
      }
    }

    async function loadData() {
      const cache = loadCache();
      if (cache && Array.isArray(cache.items)) {
        window.__dataOrigin = "cache";
        return cache;
      }
      const res = await fetch(`${DATA_URL}?v=${Date.now()}`, { cache: "no-store" });
      if (!res.ok) throw new Error("No se pudo cargar data.");
      const json = await res.json();
      if (!json || !Array.isArray(json.items)) throw new Error("Formato de data invalido.");
      saveCache(json);
      window.__dataOrigin = "remote";
      return json;
    }

    function openDetail(item) {
      const title = document.getElementById("modal-title");
      const content = document.getElementById("modal-content");
      title.textContent = item.nombre;
      const mineralPills = (item.mineral || []).map((m) => `<span style="display:inline-block;background:${colorFor(item)};color:#111;padding:4px 10px;border-radius:999px;font-weight:700;margin-right:6px">${m.toUpperCase()}</span>`).join("");
      const freeSection = item.libre ? `
        <div class="card" style="border-color:rgba(45,122,79,0.45);background:rgba(45,122,79,0.2)">
          <strong>Concesion disponible</strong><br>
          Potencial: ${item.potencial || "-"}<br>
          Profundidad: ${item.prof || "-"}<br>
          Ultimo estudio: ${(item.estudioFecha || "-")} ${(item.estudioFuente ? "· " + item.estudioFuente : "")}
        </div>
      ` : "";
      const docs = Array.isArray(item.docs) ? item.docs.map((d) => `
        <a class="link-btn" style="margin-right:8px;background:#2b2b2b;color:#fff;border:1px solid var(--line)" href="${d.url}" target="_blank" rel="noreferrer">${d.n}</a>
      `).join("") : "";

      content.innerHTML = `
        <div style="color:var(--gold);margin-bottom:10px">${item.tipo} · ${item.region}</div>
        <div style="margin-bottom:12px">${mineralPills}</div>
        <div class="card">
          Empresa: <strong>${item.empresa || "Disponible para concesion"}</strong><br>
          Superficie: <strong>${item.sup || "-"}</strong><br>
          Altitud: <strong>${item.alt || "-"}</strong><br>
          Produccion: <strong>${item.prod || "-"}</strong>
        </div>
        <div class="card">
          Dotacion: <strong>${item.dotacion || "-"}</strong><br>
          Sueldos promedio: <strong>${item.sueldos_promedio || "-"}</strong><br>
          Ingresos anuales: <strong>${item.ingresos || "-"}</strong><br>
          Contrataciones futuras: <strong>${item.contrataciones_futuras || "-"}</strong>
        </div>
        ${freeSection}
        <div class="card">${item.noticias || "Sin novedades por ahora."}</div>
        ${docs ? `<div style="margin-bottom:10px">${docs}</div>` : ""}
        ${(item.web && item.web !== "#") ? `<a class="link-btn" href="${item.web}" target="_blank" rel="noreferrer">Ver pagina corporativa</a>` : ""}
      `;
      document.getElementById("detail-modal").classList.add("open");
    }

    function closeModal() {
      document.getElementById("detail-modal").classList.remove("open");
    }
    window.closeModal = closeModal;

    async function bootstrap() {
      wireUi();
      try {
        const payload = await loadData();
        allItems = payload.items;
        window.__dataUpdatedAt = payload.meta && payload.meta.updatedAt;
        const minerals = new Set(allItems.flatMap((x) => x.mineral || []));
        const regions = new Set(allItems.map((x) => x.region).filter(Boolean));
        const tipos = new Set(allItems.map((x) => x.tipo).filter(Boolean));
        fillSelect(els.mineral, minerals, "Todos");
        fillSelect(els.region, regions, "Todas");
        fillSelect(els.tipo, tipos, "Todos");
        setTopKpis(payload.meta || {}, allItems);
        applyFilters();
        fitToFiltered();
      } catch (error) {
        els.status.textContent = "No fue posible cargar la informacion. Revisa data/yacimientos.json.";
        console.error(error);
      }
    }

    bootstrap();
  </script>
</body>
</html>
